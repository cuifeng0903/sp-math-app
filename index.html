<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4ECDC4">
    <title>スピードたしざん！</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./sp-math-180.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --primary: #4ECDC4;
            --accent: #FF6B6B;
            --bg: #F9F7E8;
            --timer-color: #FF4444;
            --correct-highlight: #4CAF50;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: #333;
        }
        header {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 1.8vh 0;
            font-size: clamp(1.3rem, 4.5vw, 1.7rem);
            font-weight: 900;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }
        .screen {
            height: calc(100vh - 7.5vh);
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 1.5vh 3.5vw;
        }
        .screen.active { display: flex; }
        
        #top-screen { justify-content: center; }
        #top-screen h1 {
            font-size: clamp(2.8rem, 13vw, 5rem);
            margin-bottom: 6vh;
            color: var(--accent);
            text-shadow: 3px 3px 0 #fff;
        }
        .big-btn {
            font-size: clamp(1.5rem, 6.5vw, 2.1rem);
            padding: 3.5vh 7vw;
            border-radius: 28px;
            background: #FF9800;
            color: white;
            border: none;
            box-shadow: 0 7px 0 #e68a00;
            width: 92%;
            max-width: 400px;
            margin: 1vh 0;
        }
        .big-btn:active { transform: translateY(3px); box-shadow: 0 4px 0 #e68a00; }
        
        /* 問題画面 */
        #game-screen { justify-content: space-between; }
        #question-count { font-size: clamp(1rem, 3.8vw, 1.2rem); color: #666; margin: 0.8vh 0; }
        #timer-container {
            position: relative;
            width: 34vw;
            height: 34vw;
            max-width: 180px;
            max-height: 180px;
            margin: 1vh 0;
        }
        #timer-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        #timer-bg { fill: none; stroke: #eee; stroke-width: 5.5; }
        #timer-progress {
            fill: none;
            stroke: var(--timer-color);
            stroke-width: 5.5;
            stroke-linecap: round;
        }
        #timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 9vw, 2.8rem);
            font-weight: 900;
        }
        #problem {
            font-size: clamp(4.2rem, 16vw, 7rem);
            font-weight: 900;
            background: white;
            padding: 1.8vh 5.5vw;
            border-radius: 28px;
            box-shadow: 0 9px 18px rgba(0,0,0,0.14);
            text-align: center;
            min-width: 72vw;
            max-width: 92vw;
        }
        #choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.8vh;
            width: 100%;
            max-width: 400px;
            margin-top: 1.5vh;
        }
        .choice-btn {
            font-size: clamp(2.6rem, 11vw, 3.8rem);
            font-weight: 900;
            padding: 4.5vh 0;
            background: #FFEEAD;
            border: none;
            border-radius: 24px;
            box-shadow: 0 7px 0 #f0d68a;
            color: #333;
        }
        .choice-btn.correct-answer {
            background: var(--correct-highlight);
            color: white;
            box-shadow: 0 7px 0 #388E3C;
        }
        .choice-btn:disabled { opacity: 0.45; }
        .choice-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 4px 0 #f0d68a; }
        
        /* フィードバック */
        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(9rem, 38vw, 15rem);
            font-weight: 900;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 35px rgba(0,0,0,0.35);
            line-height: 1.05;
        }
        .correct { color: #FF4444; animation: pop 0.7s ease-out; }
        .wrong   { color: #4488FF; animation: shake 0.6s ease-out; }
        #score-text {
            font-size: clamp(4.5rem, 20vw, 7rem);
            font-weight: 900;
            color: #4CAF50;
            margin-top: -1vh;
        }
        
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; } 65% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); } }
        @keyframes shake { 0%,100% { transform: translate(-50%, -50%); } 25% { transform: translate(calc(-50% - 9vw), -50%); } 75% { transform: translate(calc(-50% + 9vw), -50%); } }
        
        /* 結果画面：下部にボタン2つ分以上の余白を確保 */
        #result-screen {
            justify-content: space-between;
            padding: 2vh 4vw 22vh; /* ← 下部余白をさらに拡大（ボタン2つ＋α） */
        }
        #result-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.8vh;
            width: 100%;
        }
        #total-score { font-size: clamp(3.8rem, 17vw, 5.2rem); font-weight: 900; color: var(--accent); }
        #stamp-area { text-align: center; margin: 3vh 0 2vh; }
        #stamp { font-size: clamp(7.5rem, 38vw, 11rem); filter: drop-shadow(0 9px 14px rgba(0,0,0,0.18)); }
        #stamp-name { font-size: clamp(1.7rem, 7.5vw, 2.3rem); font-weight: 700; color: #555; margin-top: 0.8vh; }
        
        .result-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5vh;
            width: 100%;
            max-width: 400px;
        }
        
        /* ランキング */
        #ranking-screen { justify-content: flex-start; }
        #ranking-list { width: 100%; max-width: 460px; overflow-y: auto; flex: 1; padding: 1vh 0; }
        .date-header { background: var(--primary); color: white; padding: 1.4vh; border-radius: 14px; font-size: clamp(1.1rem, 4.8vw, 1.3rem); margin: 1.8vh 0 0.8vh; }
        .rank-item {
            background: white;
            padding: 1.8vh;
            border-radius: 18px;
            margin-bottom: 1.2vh;
            display: flex;
            align-items: center;
            gap: 2.8vw;
            box-shadow: 0 3px 8px rgba(0,0,0,0.07);
        }
        .rank-position {
            position: relative;
            width: 55px;
            height: 55px;
            font-size: 2rem;
            font-weight: 900;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rank-position::before {
            content: '';
            position: absolute;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.9;
        }
        .rank-1::before { background-image: url('https://img.icons8.com/emoji/96/000000/1st-place-medal.png'); }
        .rank-2::before { background-image: url('https://img.icons8.com/emoji/96/000000/2nd-place-medal.png'); }
        .rank-3::before { background-image: url('https://img.icons8.com/emoji/96/000000/3rd-place-medal.png'); }
        
        .mute-btn {
            position: fixed;
            bottom: 1.8vh;
            right: 3.5vw;
            font-size: clamp(1.5rem, 6.5vw, 1.9rem);
            background: none;
            border: none;
            z-index: 200;
        }
    </style>
</head>
<body>

    <header>スピードたしざん！</header>

    <div id="top-screen" class="screen active">
        <h1>はやく こたえよう！</h1>
        <button onclick="startNewSet()" class="big-btn">ゲームを はじめる！</button>
        <button onclick="showScreen('ranking-screen')" class="big-btn" style="background:var(--primary);">きろくを みる</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="question-count">1 / 20</div>
        
        <div id="timer-container">
            <svg id="timer-svg" viewBox="0 0 36 36">
                <circle id="timer-bg" cx="18" cy="18" r="16"/>
                <circle id="timer-progress" cx="18" cy="18" r="16" stroke-dasharray="100.53096491487338" stroke-dashoffset="0"/>
            </svg>
            <div id="timer-text">2</div>
        </div>
        
        <div id="problem">1 + 1 = </div>
        
        <div id="choices"></div>
    </div>

    <div id="feedback">
        <span id="mark"></span>
        <div id="score-text"></div>
    </div>

    <div id="result-screen" class="screen">
        <div id="result-content">
            <h2>おわり！ すごいね！</h2>
            <div style="font-size: clamp(1.1rem,4.8vw,1.3rem); margin:0.8vh 0;">てんすう</div>
            <div id="total-score">85てん！</div>
            
            <div id="stamp-area">
                <div id="stamp">🚀</div>
                <div id="stamp-name">ろけっと</div>
            </div>
        </div>
        
        <div class="result-buttons">
            <button onclick="startNewSet()" class="big-btn" style="background:#4CAF50;">もういちど！</button>
            <button onclick="showScreen('top-screen')" class="big-btn" style="background:#999;">トップにもどる</button>
        </div>
    </div>

    <div id="ranking-screen" class="screen">
        <h2 style="font-size: clamp(1.5rem,5.8vw,1.9rem); margin-bottom:1.8vh;">きょうの がんばり</h2>
        <div id="ranking-list"></div>
        <button onclick="showScreen('top-screen')" class="big-btn" style="background:#999; width:92%; max-width:400px; margin-top: auto;">もどる</button>
    </div>

    <button onclick="toggleMute()" class="mute-btn" id="mute-btn">🔊</button>

    <script>
        // 定数（ここを変えると難易度調整できます！）
        const NUM_QUESTIONS = 20;
        const TIME_LIMIT = 2000;
        const MIN_NUM = 0;
        const MAX_NUM = 10;
        
        function calculateScore(remainingMs) {
            if (remainingMs > 1200) return 5;
            if (remainingMs > 900)  return 4;
            if (remainingMs > 600)  return 3;
            if (remainingMs > 300)  return 2;
            return 1;
        }
        
        const STAMP_CATEGORIES = [
            { min: 0,   max: 19,  category: "いちばん おそい", names: ["かたつむり", "なまけもの", "いもむし", "あり", "てんとう虫"] },
            { min: 20,  max: 39,  category: "ゆっくり",       names: ["かめ", "コアラ", "らくだ", "きりん", "ぞう"] },
            { min: 40,  max: 59,  category: "ふつうの速さ",   names: ["いぬ", "ねこ", "うさぎ", "じてんしゃ", "キックボード"] },
            { min: 60,  max: 79,  category: "はやい！",       names: ["チーター", "くるま", "ひこうき", "バイク", "わし"] },
            { min: 80,  max: 100, category: "さいこう はやい！", names: ["ろけっと", "しんかんせん", "いなずま", "ほし", "ヒーロー"] }
        ];
        
        const STORAGE_KEY = 'speedAdditionRanking';
        
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let timerInterval = null;
        let startTime = 0;
        let isMuted = false;
        let audioContext;
        let answered = false;
        
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        
        function initAudio() { if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (isMuted || !audioContext) return;
            initAudio();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain); gain.connect(audioContext.destination);
            if (type === 'correct') {
                osc.frequency.setValueAtTime(880, audioContext.currentTime); gain.gain.value = 0.3;
                osc.start(); setTimeout(() => osc.stop(), 180);
            } else {
                osc.frequency.setValueAtTime(220, audioContext.currentTime); gain.gain.value = 0.4;
                osc.start(); setTimeout(() => osc.stop(), 280);
            }
        }
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
        }
        
        function generateQuestion() {
            const a = Math.floor(Math.random() * (MAX_NUM - MIN_NUM + 1)) + MIN_NUM;
            const b = Math.floor(Math.random() * (MAX_NUM - MIN_NUM + 1)) + MIN_NUM;
            const correct = a + b;
            let choices = [correct];
            while (choices.length < 4) {
                let wrong = Math.floor(Math.random() * 21);
                if (wrong !== correct && !choices.includes(wrong)) choices.push(wrong);
            }
            for (let i = choices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [choices[i], choices[j]] = [choices[j], choices[i]];
            }
            return { a, b, correct, choices };
        }
        
        function showQuestion() {
            answered = false;
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('problem').textContent = `${q.a} + ${q.b} = `;
            document.getElementById('question-count').textContent = `${currentQuestionIndex + 1} / ${NUM_QUESTIONS}`;
            
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            q.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice;
                btn.dataset.value = choice;
                btn.onclick = () => { if (!answered) handleAnswer(choice); };
                choicesDiv.appendChild(btn);
            });
            startTimer();
        }
        
        function startTimer() {
            if (timerInterval) cancelAnimationFrame(timerInterval);
            startTime = Date.now();
            const progress = document.getElementById('timer-progress');
            const circumference = 2 * Math.PI * 16;
            progress.setAttribute('stroke-dasharray', circumference);
            progress.setAttribute('stroke-dashoffset', 0);
            document.getElementById('timer-text').textContent = Math.ceil(TIME_LIMIT / 1000);
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, TIME_LIMIT - elapsed);
                const ratio = remaining / TIME_LIMIT;
                const offset = circumference * ratio;
                progress.setAttribute('stroke-dashoffset', offset);
                document.getElementById('timer-text').textContent = Math.ceil(remaining / 1000);
                
                if (remaining > 0) {
                    timerInterval = requestAnimationFrame(animate);
                } else {
                    handleTimeout();
                }
            }
            timerInterval = requestAnimationFrame(animate);
        }
        
        function handleTimeout() {
            answered = true;
            highlightCorrectAnswer();
            document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
            showFeedback(false, 0);
        }
        
        function handleAnswer(selected) {
            if (timerInterval) cancelAnimationFrame(timerInterval);
            answered = true;
            highlightCorrectAnswer();
            document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
            
            const q = currentQuestions[currentQuestionIndex];
            const elapsed = Date.now() - startTime;
            const remainingMs = Math.max(0, TIME_LIMIT - elapsed);
            const isCorrect = selected === q.correct;
            let points = isCorrect ? calculateScore(remainingMs) : 0;
            totalScore += points;
            showFeedback(isCorrect, points);
        }
        
        function highlightCorrectAnswer() {
            const correctBtn = Array.from(document.querySelectorAll('.choice-btn')).find(btn => 
                parseInt(btn.dataset.value) === currentQuestions[currentQuestionIndex].correct
            );
            if (correctBtn) correctBtn.classList.add('correct-answer');
        }
        
        function showFeedback(isCorrect, points) {
            const fb = document.getElementById('feedback');
            const mark = document.getElementById('mark');
            const scoreText = document.getElementById('score-text');
            
            fb.style.display = 'block';
            if (isCorrect) {
                mark.textContent = '○';
                scoreText.textContent = `＋${points}`;
                scoreText.style.display = 'block';
                playSound('correct');
            } else {
                mark.textContent = '×';
                scoreText.style.display = 'none';
                playSound('wrong');
            }
            
            setTimeout(() => {
                fb.style.display = 'none';
                currentQuestionIndex++;
                if (currentQuestionIndex < NUM_QUESTIONS) {
                    showQuestion();
                } else {
                    endSet();
                }
            }, 800);
        }
        
        function startNewSet() {
            currentQuestions = Array.from({length: NUM_QUESTIONS}, generateQuestion);
            currentQuestionIndex = 0;
            totalScore = 0;
            showScreen('game-screen');
            showQuestion();
        }
        
        function endSet() {
            const stampObj = getStamp(totalScore);
            showScreen('result-screen');
            document.getElementById('total-score').textContent = `${totalScore}てん！`;
            document.getElementById('stamp').textContent = stampObj.emoji;
            document.getElementById('stamp-name').textContent = stampObj.name;
            saveResult(totalScore, stampObj.emoji, stampObj.category, stampObj.name);
        }
        
        function getStamp(score) {
            for (let cat of STAMP_CATEGORIES) {
                if (score >= cat.min && score <= cat.max) {
                    const idx = Math.floor(Math.random() * cat.names.length);
                    const allEmojis = ["🐌","🦥","🐛","🐜","🪲","🐢","🐨","🐪","🦒","🐘","🐶","🐱","🐰","🚲","🛴","🐆","🚗","✈️","🏍️","🦅","🚀","🚄","⚡","🌟","🦸"];
                    const base = STAMP_CATEGORIES.indexOf(cat) * 5;
                    return {
                        emoji: allEmojis[base + idx],
                        name: cat.names[idx],
                        category: cat.category
                    };
                }
            }
            return { emoji: '🌟', name: 'ほし', category: 'さいこう はやい！' };
        }
        
        function saveResult(score, stampEmoji, category, stampName) {
            const jstNow = new Date();
            const today = jstNow.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
            const time = jstNow.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit' });
            
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            if (!data[today]) data[today] = [];
            data[today].push({
                score,
                stampEmoji,
                stampCategory: category,
                stampName,
                timestamp: time
            });
            data[today].sort((a,b) => b.score - a.score);
            data[today] = data[today].slice(0, 10);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        function renderRanking() {
            const container = document.getElementById('ranking-list');
            container.innerHTML = '';
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            const dates = Object.keys(data).sort().reverse();
            if (dates.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888; padding:10vh 0;">まだ あそんでないよ<br>はじめて あそぼう！</p>';
                return;
            }
            dates.forEach(date => {
                const header = document.createElement('div');
                header.className = 'date-header';
                header.textContent = date === new Date().toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-') 
                    ? 'きょうの がんばり' : date;
                container.appendChild(header);
                
                data[date].forEach((item, idx) => {
                    const div = document.createElement('div');
                    div.className = 'rank-item';
                    const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : '';
                    div.innerHTML = `
                        <div class="rank-position ${rankClass}">${idx + 1}</div>
                        <div style="flex:1;">
                            <div style="font-size: clamp(1.4rem,6.5vw,1.7rem); font-weight:900; color:var(--accent);">${item.score}てん</div>
                            <div style="font-size: clamp(0.95rem,3.8vw,1.05rem); color:#555;">${item.timestamp}</div>
                        </div>
                        <div style="font-size: clamp(1.8rem,8vw,2.4rem);">${item.stampEmoji}</div>
                    `;
                    container.appendChild(div);
                });
            });
        }
        
        function init() {
            renderRanking();
            console.log('%csp-math-app 更新完了！ 結果画面下部にボタン2つ分の余白を確保♪', 'color:#4ECDC4; font-size:14px');
        }
        window.onload = init;
    </script>
</body>
</html>
